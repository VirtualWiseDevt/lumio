services:
  postgres:
    image: postgres:16-alpine
    container_name: lumio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lumio
      POSTGRES_USER: lumio
      POSTGRES_PASSWORD: lumio_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumio -d lumio"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumio-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: lumio-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: lumio_access_key
      MINIO_ROOT_PASSWORD: lumio_secret_key
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  api:
    container_name: lumio-api
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://lumio:lumio_dev_password@postgres:5432/lumio?schema=public
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3003
      JWT_SECRET: dev-jwt-secret-at-least-32-characters-long
      REDIS_HOST: redis
      REDIS_PORT: 6379
      R2_ENDPOINT: http://minio:9000
      R2_ACCOUNT_ID: local
      R2_ACCESS_KEY_ID: lumio_access_key
      R2_SECRET_ACCESS_KEY: lumio_secret_key
      R2_BUCKET_NAME: lumio-dev
      R2_PUBLIC_URL: localhost:9000/lumio-dev
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT:-mock}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-http://localhost:5000/api/mpesa/callback}
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-console}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@lumio.tv}
    volumes:
      - ./api/src:/app/src
      - ./api/prisma:/app/prisma
      - ./api/prisma.config.ts:/app/prisma.config.ts
      - api-uploads:/app/uploads
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npx tsx --watch src/server.ts"

volumes:
  postgres_data:
  minio_data:
  api-uploads:
